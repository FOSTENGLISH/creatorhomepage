<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna AI Creator Hub</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-title {
            margin-top: 15px;
            font-size: 24px;
            font-weight: 800;
            color: #333;
        }

        .link-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease-in-out;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        /* [수정] 소개란 카드 디자인 - 사진 크기 고정 */
        .intro-card {
            border: 1.5px solid #007bff;
            background-color: #f8fbff;
        }
        
        /* 원장님 사진 크기를 아이콘처럼 작게 설정 */
        .intro-photo {
            width: 50px; /* 크기를 50px로 고정 */
            height: 50px;
            border-radius: 50%; 
            margin-right: 15px;
            object-fit: cover; /* 사진이 일그러지지 않게 채움 */
            border: 2px solid #007bff;
            flex-shrink: 0; /* 사진이 찌그러지지 않도록 방지 */
        }

        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .link-text {
            display: flex;
            flex-direction: column;
        }
        .link-name {
            font-weight: bold;
            font-size: 16px;
        }
        .link-url {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

   <div class="profile-section">
        <img src="원장.png" alt="Anna Profile" class="profile-img">
        <div class="profile-title">Anna AI Hub</div>
    </div>

    <div class="link-container">
        
        <a href="https://fostenglish.github.io/resume/" class="link-card intro-card">
            <img src="me.png" alt="Anna" class="intro-photo">
            <div class="link-text">
                <span class="link-name">Anna AI 소개 </span>
            </div>
        </a>
        <a href="https://contents.premium.naver.com/annasjy/newstalk" class="link-card" target="_blank">
            <img src="프리미엄.png" alt="Blog" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 뉴스영어회화 </span>
            </div>
        </a>

        <a href="https://class101.net/ko/products/691f2651b891f48b5afdc752?from=home" class="link-card" target="_blank">
            <img src="클래스.png" alt="YouTube" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 클래스101 강의 </span>
            </div>
        </a>

        <a href="https://www.youtube.com/@aiedunewscreator/shorts" class="link-card" target="_blank">
            <img src="유튜브.png" alt="Naver" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 유튜브</span>
            </div>
        </a>
        
        <a href="https://blog.naver.com/annasjy" class="link-card" target="_blank">
            <img src="블로그.PNG" alt="Coupon" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 블로그</span>
            </div>
        </a>
        
        <a href="https://www.tiktok.com/@aiedunewscreator?lang=ko-KR?lang=ko-KR" class="link-card" target="_blank">
            <img src="틱톡.PNG" alt="Class101" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 틱톡</span>
            </div>
        </a>

       
    </div>

</body>
</html>
