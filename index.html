<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna AI Hub</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 상단 프로필 */
        .profile-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-title {
            margin-top: 15px;
            font-size: 28px;
            font-weight: 800;
            color: #333;
            margin-bottom: 5px;
        }

        /* 특허 문구 - Anna AI만 볼드 */
        .patent-text {
            font-size: 15px;
            color: #007bff; 
            font-weight: 400;
            margin-bottom: 25px;
        }
        .patent-text strong {
            font-weight: 800;
        }

        /* 링크 컨테이너 */
        .link-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 모든 카드 공통 스타일 (테두리 없음) */
        .link-card {
            display: flex;
            align-items: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease-in-out;
            height: 50px; /* 모든 칸 높이 통일 */
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        
        /* [핵심] 원장님 사진 크기 강제 고정 */
        .intro-photo {
            width: 48px !important;  /* !important를 붙여서 강제로 크기 고정 */
            height: 48px !important;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        /* 일반 서비스 아이콘 크기 */
        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .link-name {
            font-weight: bold;
            font-size: 17px;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="원장.png" alt="Anna Profile" class="profile-img">
        <div class="profile-title">Anna AI Hub</div>
        <div class="patent-text">Anna AI 융합사고력 교육 특허출원</div>
    </div>

    <div class="link-container">
        
        <a href="https://anna-ai-hub.github.io/resume/" class="link-card intro-card">
            <img src="me.png" alt="Anna" class="intro-photo">
            <div class="link-text">
                <span class="link-name">Anna AI 소개 </span>
            </div>
        </a>
        <a href="https://contents.premium.naver.com/annasjy/newstalk" class="link-card" target="_blank">
            <img src="프리미엄.png" alt="Blog" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 뉴스영어회화 </span>
            </div>
        </a>

        <a href="https://class101.net/ko/products/691f2651b891f48b5afdc752?from=home" class="link-card" target="_blank">
            <img src="클래스.png" alt="YouTube" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 클래스101강의 </span>
            </div>
        </a>

        <a href="https://www.youtube.com/@aiedunewscreator/shorts" class="link-card" target="_blank">
            <img src="유튜브.png" alt="Naver" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 유튜브</span>
            </div>
        </a>
        
        <a href="https://blog.naver.com/annasjy" class="link-card" target="_blank">
            <img src="블로그.PNG" alt="Coupon" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 블로그</span>
            </div>
        </a>
        
        <a href="https://www.tiktok.com/@aiedunewscreator?lang=ko-KR?lang=ko-KR" class="link-card" target="_blank">
            <img src="틱톡.PNG" alt="Class101" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 틱톡</span>
            </div>
        </a>

       
    </div>

</body>
</html>
