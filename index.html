<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna AI EduNews Creator</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 상단 프로필 섹션 */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ddd; /* 사진 없을 때 기본색 */
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-title {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        .profile-title a {
            text-decoration: none;
            color: #333;
            transition: color 0.3s;
        }
        .profile-title a:hover {
            color: #007bff;
        }

        /* 링크 카드 섹션 */
        .link-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            display: flex;
            align-items: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            margin-right: 15px;
            object-fit: cover;
        }
        .link-text {
            display: flex;
            flex-direction: column;
        }
        .link-name {
            font-weight: bold;
            font-size: 16px;
        }
        .link-url {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="원장.png" alt="Anna Profile" class="profile-img">
        <div class="profile-title">
            <a href="https://fostenglish.github.io/resume/">Anna AI EduNews Creator</a>
        </div>
    </div>

    <div class="link-container">
        <a href="https://contents.premium.naver.com/annasjy/newstalk" class="link-card" target="_blank">
            <img src="프리미엄.png" alt="Blog" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 네이버 프리미엄 콘텐츠</span>
                <span class="link-url">blog.naver.com</span>
            </div>
        </a>

        <a href="https://class101.net/ko/products/691f2651b891f48b5afdc752?from=home" class="link-card" target="_blank">
            <img src="클래스.png" alt="YouTube" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI Class 101강의 </span>
                <span class="link-url">youtube.com</span>
            </div>
        </a>

        <a href="https://www.youtube.com/@aiedunewscreator/shorts" class="link-card" target="_blank">
            <img src="유튜브.PNG" alt="Naver" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 유튜브</span>
                <span class="link-url">contents.premium.naver.com</span>
            </div>
        </a>

        <a href="https://www.tiktok.com/@aiedunewscreator?lang=ko-KR?lang=ko-KR" class="link-card" target="_blank">
            <img src="틱톡.PNG" alt="Class101" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 틱톡</span>
                <span class="link-url">class101.net</span>
            </div>
        </a>

        <a href="https://blog.naver.com/annasjy" class="link-card" target="_blank">
            <img src="블로그.PNG" alt="Coupon" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 블로그</span>
                <span class="link-url">abr.ge</span>
            </div>
        </a>
    </div>

</body>
</html>
