<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna AI Creator Hub</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 상단 프로필 섹션 */
        .profile-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ddd;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-title {
            margin-top: 15px;
            font-size: 26px;
            font-weight: 800;
            color: #333;
        }

        /* 링크 컨테이너 */
        .link-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 공통 카드 스타일 */
        .link-card {
            display: flex;
            align-items: center;
            background-color: #fff;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease-in-out;
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background-color: #fafafa;
        }

        /* Anna AI 소개란 특별 스타일 (가장 상단 배치) */
        .intro-card {
            border: 2px solid #007bff; /* 포스트잉글리쉬 블루 포인트 */
            background-color: #f8fbff;
        }
        .intro-card:hover {
            background-color: #007bff;
        }
        .intro-card:hover .link-name, 
        .intro-card:hover .link-url {
            color: #fff;
        }

        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .link-text {
            display: flex;
            flex-direction: column;
        }
        .link-name {
            font-weight: bold;
            font-size: 17px;
        }
        .link-url {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="원장.png="Anna Profile" class="profile-img">
        <div class="profile-title">Anna AI Creator Hub</div>
    </div>

    <div class="link-container">
        
        <a href="https://fostenglish.github.io/resume/" class="link-card intro-card">
            <div class="link-icon">✨</div>
            <div class="link-text">
                <span class="link-name">Anna AI 소개 (Introduce)</span>
            </div>
        </a>
        <a href="https://contents.premium.naver.com/annasjy/newstalk" class="link-card" target="_blank">
            <img src="프리미엄.png" alt="Blog" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 프리미엄 콘텐츠</span>
            </div>
        </a>

        <a href="https://class101.net/ko/products/691f2651b891f48b5afdc752?from=home" class="link-card" target="_blank">
            <img src="클래스.png" alt="YouTube" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI Class 101강의 </span>
            </div>
        </a>

        <a href="https://www.youtube.com/@aiedunewscreator/shorts" class="link-card" target="_blank">
            <img src="유튜브.png" alt="Naver" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 유튜브</span>
            </div>
        </a>
        
        <a href="https://blog.naver.com/annasjy" class="link-card" target="_blank">
            <img src="블로그.PNG" alt="Coupon" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 블로그</span>
            </div>
        </a>
        
        <a href="https://www.tiktok.com/@aiedunewscreator?lang=ko-KR?lang=ko-KR" class="link-card" target="_blank">
            <img src="틱톡.PNG" alt="Class101" class="link-icon">
            <div class="link-text">
                <span class="link-name">Anna AI 틱톡</span>
            </div>
        </a>

       
    </div>

</body>
</html>
